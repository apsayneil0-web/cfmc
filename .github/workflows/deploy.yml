name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Hostinger Deployment
        run: |
          curl -X POST "${{ secrets.HOSTINGER_WEBHOOK }}"
        env:
          HOSTINGER_WEBHOOK: ${{ secrets.HOSTINGER_WEBHOOK }}